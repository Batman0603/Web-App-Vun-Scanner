services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - crawler-service
      - attack-surface-service
      - payload-service
      - detection-service
      - report-service

  crawler-service:
    build:
      context: .
      dockerfile: crawler-service/Dockerfile
    ports:
      - "8001:8001"

  attack-surface-service:
    build:
      context: .
      dockerfile: attack-surface-service/Dockerfile
    ports:
      - "8002:8002"

  payload-service:
    build:
      context: .
      dockerfile: payload-service/Dockerfile
    ports:
      - "8003:8003"

  detection-service:
    build:
      context: .
      dockerfile: detection-service/Dockerfile
    ports:
      - "8004:8004"

  report-service:
    build:
      context: .
      dockerfile: report-service/Dockerfile
    ports:
      - "8005:8005"

networks:
  default:
    name: vuln-scanner-net